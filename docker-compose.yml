# Mnemo - Neo4j 记忆图数据库
# 一键启动: docker compose up -d
# 访问: http://localhost:7474 (Neo4j Browser)
# Bolt:  bolt://localhost:7687
# 默认账号: neo4j / mnemo_dev_password (请在生产环境修改)

services:
  neo4j:
    image: neo4j:5.26
    container_name: mnemo-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/mnemo_dev_password
      # 启用 APOC 与向量索引相关能力
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs:
